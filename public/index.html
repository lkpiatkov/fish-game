<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fish</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Home screen -->
  <div id="screen-home" class="screen active">
    <h1>Fish</h1>
    <input id="input-name" type="text" placeholder="Your name" maxlength="20"/>
    <div class="button-row">
      <button id="btn-create">Create room</button>
      <button id="btn-join">Join room</button>
    </div>
    <div id="join-code-row" class="hidden">
      <input id="input-code" type="text" placeholder="Room code" maxlength="6"/>
      <button id="btn-join-confirm">Go</button>
    </div>
    <p id="home-error" class="error hidden"></p>
  </div>

  <!-- Lobby screen -->
  <div id="screen-lobby" class="screen hidden">
    <h1>Fish</h1>
    <p>Room code: <strong id="lobby-code"></strong></p>
    <p>Share this code with your friends!</p>
    <ul id="lobby-players"></ul>
    <p id="lobby-waiting">Players: <span id="lobby-count">1</span>/6</p>
    <button id="btn-start" class="hidden">Start game</button>
    <p id="lobby-error" class="error hidden"></p>
  </div>

  <!-- Game screen -->
  <div id="screen-game" class="screen hidden">
    <div id="player-name-header"></div>
    <div id="game-header">
      <div id="turn-indicator"></div>
      <div id="score"></div>
    </div>
    <div id="player-list"></div>
    <div id="my-hand"></div>
    <button id="btn-declare-open" class="declare-btn">Declare a set</button>
    <div id="ask-ui"></div>
    <div id="game-log"></div>
  </div>

  <!-- Game over screen -->
  <div id="screen-game-over" class="screen hidden">
    <h1>Game over!</h1>
    <p id="game-over-msg"></p>
  </div>

  <!-- Declaration modal -->
  <div id="declare-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Declare a set</h2>
      <div id="declare-form"></div>
      <div class="button-row">
        <button id="btn-declare-confirm">Confirm</button>
        <button id="btn-declare-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
